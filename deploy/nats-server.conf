# VALOR NATS Server Configuration (Docker)
# Reference: infrastructure/nats.conf (bare-metal equivalent)

listen: "0.0.0.0:4222"
max_payload: 1048576

# HTTP monitoring — used for health checks
http_port: 8222

# JetStream for durable queues (missions must survive restarts)
jetstream {
  store_dir: "/data/jetstream"
  max_mem_store: 268435456     # 256 MB
  max_file_store: 1073741824   # 1 GB
}
