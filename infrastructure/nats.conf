# VALOR NATS Server Configuration
# Reference: docs/nats-subjects.md, docs/PHASE-1-NATS.md

listen: "0.0.0.0:4222"
max_payload: 1048576

# JetStream for durable queues (missions must survive restarts)
jetstream {
  store_dir: "./data/jetstream"
  max_mem_store: 268435456
  max_file_store: 1073741824
}
